<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metabolic Reset Self-Assessment</title>
    <style>
        body {
            font-family: 'Noto Serif Thai', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f1e8 0%, #faebd4 100%);
            margin: 0;
            padding: 20px;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            max-width: 500px;
        }
        h1 {
            color: #111111;
            font-size: 28px;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
        }
        a, button {
            display: inline-block;
            padding: 14px 40px;
            background: linear-gradient(135deg, #111111 0%, #8b7355 100%);
            color: #faebd4;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            font-family: 'Noto Serif Thai', sans-serif;
        }
        a:hover, button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .result-card {
            background: linear-gradient(135deg, #f5f1e8 0%, #f9f5ed 100%);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #d4b876;
            margin: 15px 0;
            text-align: left;
        }
        .result-label {
            font-size: 12px;
            color: #8b7355;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .result-value {
            font-size: 24px;
            color: #111111;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <h1>🌱 Metabolic Reset Self-Assessment</h1>
        <p>กำลังโหลด...</p>
    </div>

    <script>
        // ตรวจสอบ URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const hasBMI = urlParams.has('bmi');
        
        const container = document.getElementById('container');
        
        if (hasBMI) {
            // แสดงผลลัพธ์ที่แชร์มา
            const bmi = urlParams.get('bmi');
            const bodyfat = urlParams.get('bodyfat');
            const age = urlParams.get('age');
            const tdee = urlParams.get('tdee');
            const calorie = urlParams.get('calorie');
            
            container.innerHTML = `
                <h1>📊 ผลลัพธ์ของคุณ</h1>
                <p style="color: #d4b876; font-size: 14px; margin-bottom: 20px;">Metabolic Reset Self-Assessment</p>
                
                <div class="result-card">
                    <div class="result-label">BMI</div>
                    <div class="result-value">${bmi}</div>
                </div>
                
                <div class="result-card">
                    <div class="result-label">Body Fat</div>
                    <div class="result-value">${bodyfat}%</div>
                </div>
                
                <div class="result-card">
                    <div class="result-label">Wellness Age Estimate</div>
                    <div class="result-value">${age} ปี</div>
                </div>
                
                <div class="result-card">
                    <div class="result-label">TDEE (kcal/วัน)</div>
                    <div class="result-value">${tdee}</div>
                </div>
                
                <div class="result-card">
                    <div class="result-label">เป้าหมายแคลอรี่</div>
                    <div class="result-value">${calorie} kcal</div>
                </div>
                
                <p style="margin-top: 30px;">
                    <a href="metabolic-wellness-assessment.html">ทำแบบประเมินเองเลย</a>
                </p>
            `;
        } else {
            // ไม่มี parameters ให้ไปเริ่มต้น
            window.location.href = 'metabolic-wellness-assessment.html';
        }
    </script>
</body>
</html>
